<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Reviews | Aegean Dream House</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
       <a href="index.html" class="logo">
            🌊 Aegean Dream House
        </a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="villa.html">The Villa</a>
            <a href="town.html">The Town</a>
            <a href="reviews.html" style="color: var(--accent-blue);">Guest Reviews</a>
            <a href="https://www.booking.com/Share-u95qrv" target="_blank" class="btn">Book Now</a>
        </div>
    </nav>

    <section class="section">
        <h2 class="section-title fade-up">What Our Guests Say</h2>
        
        <div class="review-form fade-up">
            <h3 style="margin-bottom: 20px; text-align: center; font-size: 1.8rem;">Share Your Experience</h3>
            
            <form id="reviewForm" action="https://formspree.io/f/maqaalnj" method="POST" enctype="multipart/form-data">
                
                <input type="text" name="Guest Name" placeholder="Your Name" required>
                
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <input type="text" name="Country" placeholder="Where are you from?" style="margin-bottom: 0;" required>
                    <input type="number" name="Nights Stayed" placeholder="Nights Stayed" min="1" style="margin-bottom: 0;" required>
                </div>

                <select name="Rating" required>
                    <option value="" disabled selected>Select Your Rating</option>
                    <option value="5 Stars">⭐⭐⭐⭐⭐ - Excellent (10/10)</option>
                    <option value="4 Stars">⭐⭐⭐⭐ - Very Good</option>
                    <option value="3 Stars">⭐⭐⭐ - Good</option>
                </select>
                
                <textarea name="Review Text" rows="5" placeholder="Tell us about your stay at Aegean Dream House..." required></textarea>
                
                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-blue);">Share your photos (Max 5):</label>
                    <input type="file" id="photoUpload" name="Photos" accept="image/png, image/jpeg" multiple style="padding: 10px; background: #fff;">
                    <p id="fileError" style="color: red; display: none; font-size: 0.9rem; margin-top: -10px; margin-bottom: 15px;">Please select no more than 5 images.</p>
                </div>

                <button type="submit" class="btn" id="submitBtn" style="width: 100%;">Submit Review</button>
            </form>
        </div>

        <div class="grid" id="reviewList">
            </div>
    </section>

    <footer>
        <h2 style="font-family: 'Georgia', serif; margin-bottom: 10px;">Aegean Dream House</h2>
        <p>Paralia Ofriniou, Greece | Contact: +359 88 285 0909</p>
    </footer>

    <script>
        // Mobile Menu
        document.getElementById('mobile-menu').addEventListener('click', function() {
            document.getElementById('nav-links').classList.toggle('active');
        });

        // Limit File Uploads to 5 Max
        const fileInput = document.getElementById('photoUpload');
        const submitBtn = document.getElementById('submitBtn');
        const fileError = document.getElementById('fileError');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 5) {
                fileError.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else {
                fileError.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        });

        // Scroll Fade-In Observer
        const fadeElements = document.querySelectorAll('.fade-up');
        const appearOptions = { threshold: 0.15, rootMargin: "0px 0px -50px 0px" };
        const appearOnScroll = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            });
        }, appearOptions);

        fadeElements.forEach(element => appearOnScroll.observe(element));
    </script>
</body>
</html>
